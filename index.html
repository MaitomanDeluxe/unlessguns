<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>M4A1 Gunsmith Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; font-size: 18px;
            z-index: 10;
        }
        #ui-container {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.75); color: white;
            padding: 15px; border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #444; z-index: 100;
        }
        #ui-container h3 { margin-top: 0; font-size: 16px; text-align: center; color: #aaa; letter-spacing: 1px;}
        .control-group { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;}
        label { font-size: 14px; margin-right: 15px; }
        input[type="color"] {
            border: none; width: 45px; height: 40px;
            cursor: pointer; background: none;
        }
    </style>
</head>
<body>
    <div id="loading">M4A1 データを読み込み中...</div>

    <div id="ui-container">
        <h3>GUNSMITH - PAINT</h3>
        <div class="control-group">
            <label for="paint-color">カスタム塗装色</label>
            <input type="color" id="paint-color" value="#ffffff">
        </div>
        <div style="font-size: 11px; color: #777; text-align: center; margin-top: 5px;">
            ドラッグ：回転 / 右ドラッグ：平行移動<br>スクロール：ズーム
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // 1. 基本セットアップ
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 0, 1.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // 高品質な環境光
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;

        // 2. アップロードされたテクスチャの読み込み（指定パスに修正）
        const textureLoader = new THREE.TextureLoader();
        
        // BaseColor (ベースカラー)
        const albedoMap = textureLoader.load('./textures/m4a1/Final_M4_Gun_BaseColor.png');
        albedoMap.colorSpace = THREE.SRGBColorSpace; 
        albedoMap.flipY = false;

        // Normal (法線マップ：細かいディテール・凹凸)
        const normalMap = textureLoader.load('./textures/m4a1/Final_M4_Gun_Normal.png');
        normalMap.flipY = false;

        // Roughness (粗さマップ：艶のあり・なし)
        const roughnessMap = textureLoader.load('./textures/m4a1/Final_M4_Gun_Roughness.png');
        roughnessMap.flipY = false;

        // Metallic (金属度マップ：金属部分の指定)
        const metalnessMap = textureLoader.load('./textures/m4a1/Final_M4_Gun_Metallic.png');
        metalnessMap.flipY = false;

        // 3. 高品質PBRマテリアルの結合
        const weaponMaterial = new THREE.MeshStandardMaterial({
            map: albedoMap,
            normalMap: normalMap,
            roughnessMap: roughnessMap,
            metalnessMap: metalnessMap,
            // テクスチャ側のディテールを100%引き出すための設定
            normalScale: new THREE.Vector2(1.0, 1.0), 
            roughness: 1.0,
            metalness: 1.0,
            color: 0xffffff // 初期値（白＝元のテクスチャ通り）
        });

        // 4. GLBモデルの読み込みと自動サイズ調整
        const loader = new GLTFLoader();
        let gunModel;

        loader.load('./models/m4a1.glb', function (gltf) {
            gunModel = gltf.scene;

            // 読み込んだM4A1のメッシュ全体にこの最高画質マテリアルを適用
            gunModel.traverse((child) => {
                if (child.isMesh) {
                    child.material = weaponMaterial;
                    child.geometry.computeTangents(); // 法線マップのバグを防ぐ処理
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(gunModel);

            // 【自動サイズ調整ロジック】
            const box = new THREE.Box3().setFromObject(gunModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // 位置を中央へ
            gunModel.position.x += (gunModel.position.x - center.x);
            gunModel.position.y += (gunModel.position.y - center.y);
            gunModel.position.z += (gunModel.position.z - center.z);

            // 画面に綺麗に収まる距離を計算
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 1.3; // 綺麗に見える余白

            camera.position.set(0, size.y / 2, cameraZ);
            controls.target.set(0, size.y / 2, 0);
            controls.update();

            document.getElementById('loading').style.display = 'none';

        }, function (xhr) {
            if (xhr.total > 0) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading').innerText = `M4A1 データを読み込み中... ${percent}%`;
            }
        }, function (error) {
            console.error(error);
            document.getElementById('loading').innerText = '読み込み失敗。パスやファイル名（大文字小文字）を確認してください。';
        });

        // 5. ガンペイントUI連動
        const colorPicker = document.getElementById('paint-color');
        colorPicker.addEventListener('input', (event) => {
            // ピッカーで選んだ色がBaseColorテクスチャに乗算されます
            weaponMaterial.color.set(event.target.value);
        });

        // 6. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
